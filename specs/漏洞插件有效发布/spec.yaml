id: valid-plugin-publish
name: 漏洞插件有效发布
purpose: 从漏洞插件仓库中筛出当前有效插件集合，在干净 worktree 中构建发布快照，并通过 GitHub REST API 创建 PR。
inputs:
  - name: registry_file
    type: path
    description: vuln_registry.csv 的绝对路径
  - name: repo_path
    type: path
    description: 正式插件仓库本地路径，例如 VulKit
  - name: base_branch
    type: string
    description: 发布目标基线分支，通常为 main
  - name: head_branch
    type: string
    description: 发布分支，例如 feature/chenyan
  - name: summary_title
    type: string
    description: PR 标题
outputs:
  - name: include_manifest
    type: path
    description: 本次发布的 include 清单
  - name: clean_worktree
    type: path
    description: 本次发布使用的干净 worktree
  - name: pr_url
    type: string
    description: 创建完成后的 GitHub PR 地址
tools:
  - name: git
  - name: git credential fill
  - name: powershell
  - name: python
  - name: github rest api
workflow:
  - step: 从台账中筛出 DONE 且正式文件存在的有效插件集合
  - step: 生成 include 清单，并补齐必要 fingerprint.json
  - step: 从 origin/main 创建干净 worktree
  - step: 只复制 include 清单中的文件到干净 worktree
  - step: 在干净 worktree 中 commit 并 push
  - step: 用 git credential fill 获取本机 GitHub 可用凭据
  - step: 通过 GitHub REST API 关闭旧 PR 并创建新 PR
constraints:
  - 不允许直接从脏工作树提 PR
  - 不允许把 token、密码、PAT 明文写入仓库
  - 不允许把 BLOCKED、READY、临时说明文件误发为正式结果
