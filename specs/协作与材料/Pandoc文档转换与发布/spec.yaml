id: pandoc-document-conversion-and-publishing
name: Pandoc文档转换与发布
purpose: 把文档格式识别、转换、样式控制和结果验证拆成多个可复用小能力。
inputs:
  - name: source_document
    type: path
    description: 输入文档路径
  - name: target_format
    type: string
    description: 输出格式，例如 docx、html、pdf、epub、md
outputs:
  - name: conversion_summary
    type: string
    description: 转换过程摘要
  - name: output_document
    type: path
    description: 输出文档路径
tools:
  - name: pandoc
  - name: powershell
workflow:
  - step: 识别输入输出格式
  - step: 转换文档格式
  - step: 套用模板与样式
  - step: 导出并检查最终文档
constraints:
  - 不允许没确认输入格式就盲目转换
  - 不允许把样式问题和内容问题混在一起排
