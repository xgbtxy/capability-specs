id: take-over-branch-and-get-ready
name: 接手或切换分支
purpose: 帮不熟悉 Git 的执行者确认仓库位置、当前分支、目标分支和同步状态，安全切换到可开始工作的分支。
inputs:
  - name: repo_path
    type: path
    description: 本地仓库路径
  - name: target_branch
    type: string
    description: 团队指定或用户要切换到的目标分支名
outputs:
  - name: current_branch
    type: string
    description: 当前本地分支
  - name: ready_state
    type: string
    description: 是否已进入可开始修改的状态
  - name: action_summary
    type: string
    description: 给执行者看的下一步说明
tools:
  - name: git
  - name: powershell
workflow:
  - step: 检查当前仓库是否存在未处理的本地改动
  - step: 获取远端信息并确认目标分支是否存在
  - step: 切换到目标分支或创建本地跟踪分支
  - step: 同步最新远端状态
  - step: 用自然语言说明现在是否可以开始工作
constraints:
  - 不允许在未解释风险的情况下覆盖用户本地改动
  - 不允许假设用户知道 rebase、reset、stash 等高级操作
