id: printer-address-and-connection
name: 确认打印机地址与连接方式
purpose: 在开始驱动和安装前，先确认打印机的 IP、主机名或连接类型。
inputs:
  - name: printer_hint
    type: string
    description: 已知线索，例如楼层、工位、品牌、打印机名称
outputs:
  - name: printer_address
    type: string
    description: 确认后的 IP 或主机名
  - name: connection_summary
    type: string
    description: 连接方式摘要
tools:
  - name: powershell
  - name: browser
workflow:
  - step: 确认打印机和电脑的网络关系
  - step: 从机身或网络中找到地址信息
  - step: 记录最终要使用的连接标识
constraints:
  - 不允许地址没确认就开始装驱动
